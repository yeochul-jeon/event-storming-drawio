<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>색상 매핑 설정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>색상 매핑 설정</h1>
        <p>이벤트 스토밍 포스트잇 색상과 유형 간의 매핑을 확인합니다.</p>
        <a th:href="@{/}" class="btn btn-secondary">메인으로 돌아가기</a>
    </header>

    <section class="mapping-section">
        <h2>기본 매핑</h2>
        <table>
            <thead>
            <tr>
                <th>색상</th><th>색상명</th><th>유형</th><th>설명</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="mapping : ${defaultMappings}">
                <td><span class="color-chip" th:style="'background-color:' + ${mapping.hexCode()}"></span></td>
                <td th:text="${mapping.colorName()}"></td>
                <td th:text="${mapping.type().name()}"></td>
                <td th:text="${mapping.type().getDisplayName()}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
