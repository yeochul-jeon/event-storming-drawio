<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 스토밍 -> draw.io 변환</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>Event Storming to draw.io</h1>
        <p>이벤트 스토밍 보드 사진을 업로드하면 draw.io 파일로 변환합니다.</p>
    </header>

    <section class="upload-section">
        <div id="drop-zone" class="drop-zone">
            <p>이미지를 드래그&드롭하거나 클릭하여 업로드</p>
            <p class="hint">지원 형식: PNG, JPG, WEBP (최대 20MB)</p>
            <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp" hidden>
        </div>
        <div id="preview-container" class="preview-container" style="display:none;">
            <img id="preview-image" alt="미리보기">
            <button id="remove-image" class="btn btn-secondary">제거</button>
        </div>
    </section>

    <section class="mapping-section">
        <h2>색상 매핑 설정</h2>
        <div class="mapping-grid" id="mapping-grid">
            <div th:each="mapping : ${defaultMappings}" class="mapping-row">
                <span class="color-chip" th:style="'background-color:' + ${mapping.hexCode()}"></span>
                <span th:text="${mapping.colorName()}">색상</span>
                <select th:data-color="${mapping.colorName()}">
                    <option th:each="type : ${postItTypes}"
                            th:value="${type.name()}"
                            th:text="${type.getDisplayName()}"
                            th:selected="${type == mapping.type()}">
                    </option>
                </select>
            </div>
        </div>
    </section>

    <div class="action-section">
        <button id="analyze-btn" class="btn btn-primary" disabled>분석 시작</button>
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>AI가 이미지를 분석 중입니다...</p>
        </div>
    </div>

    <section id="result-section" class="result-section" style="display:none;">
        <h2>분석 결과</h2>
        <div class="result-summary">
            <span id="postit-count"></span>
            <span id="connection-count"></span>
        </div>
        <div class="result-details">
            <table id="postit-table">
                <thead>
                <tr>
                    <th>ID</th><th>텍스트</th><th>유형</th><th>색상</th><th>위치</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="download-section">
            <a id="download-link" class="btn btn-primary" href="#">.drawio 파일 다운로드</a>
            <button id="copy-xml-btn" class="btn btn-secondary">XML 복사</button>
            <button id="download-md-btn" class="btn btn-secondary">Markdown 다운로드</button>
            <button id="copy-md-btn" class="btn btn-secondary">Markdown 복사</button>
        </div>
        <details>
            <summary>생성된 XML 미리보기</summary>
            <pre id="xml-preview"></pre>
        </details>
    </section>

    <div id="error-section" class="error-section" style="display:none;">
        <p id="error-message"></p>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
